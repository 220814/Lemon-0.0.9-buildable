name: Build Lemon Client 1.12.2

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # Chuyển lên bản mới nhất để lấy máy ảo nhanh hơn

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'zulu'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Forge Workspace
      # Thêm --no-daemon và --console=plain để log sạch hơn và đỡ tốn RAM
      run: ./gradlew setupDecompWorkspace --no-daemon --console=plain

    - name: Build with Gradle
      # Thêm -x test để bỏ qua chạy test (tiết kiệm thời gian/phút build)
      run: ./gradlew build -x test --stacktrace --no-daemon --console=plain
      
