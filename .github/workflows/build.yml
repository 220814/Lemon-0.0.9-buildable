name: Build Lemon Client 1.12.2

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    # Sử dụng ubuntu-20.04 để có độ tương thích tốt hơn với các công cụ cũ
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'zulu' # Zulu giúp tránh lỗi "bad RuntimeInvisibleParameterAnnotations"
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Forge Workspace
      # Bước này cực kỳ quan trọng đối với 1.12.2 để tải mapping và decompile Minecraft
      run: ./gradlew setupDecompWorkspace --no-daemon

    - name: Build with Gradle
      # --stacktrace giúp hiện lỗi chi tiết nếu build thất bại
      run: ./gradlew build --stacktrace --no-daemon

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Lemon-Client-1.12.2
        path: build/libs/*.jar
        
